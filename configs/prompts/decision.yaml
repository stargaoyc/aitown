name: decision
template: |
  [角色档案]
  姓名: {name}
  性格: {personality}
  背景: {backstory}

  [当前状态]
  位置: {location}
  精力: {energy}/100
  饥饿: {hunger}/100
  情绪: {mood}

  [世界状态]
  时间: {world_time}
  天气: {weather}
  场景: {scenes}

  [相关记忆]
  {memories}

  [当前计划]
  {plans}

  [候选 Action]
  {candidates}

  [严格约束]
  - 行为必须符合[世界状态]中的时间和天气（如夜晚不会外出购物，雨天可能待在室内）
  - 行为必须符合角色人设和当前状态（精力低时倾向休息，饥饿时倾向就餐）
  - 不得编造[世界状态]中不存在的时间/天气/季节信息
  - reason 字段需简明说明为何选择该动作

  [输出格式]
  请输出 JSON:
  {{ "action": "<action_id>", "reason": "<理由>", "params": {{...}}, "duration": <分钟> }}

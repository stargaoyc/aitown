name: reflection
template: |
  [角色档案]
  姓名: {name}
  性格: {personality}

  [近期经历]
  {recent_events}

  [当前状态]
  精力: {energy}/100
  情绪: {mood}

  [严格约束]
  - 反思内容必须基于[近期经历]中的真实事件，不得编造未发生的事情
  - 反思要符合角色人设和当前情绪状态
  - insights 应该是从经历中提炼的规律性认知，而非空泛描述

  [输出格式]
  请输出 JSON:
  {{ "reflection": "<反思内容>", "insights": ["<洞察1>", "<洞察2>"], "mood_change": <情绪变化> }}

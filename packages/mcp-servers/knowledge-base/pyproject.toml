[project]
name = "knowledge-base"
version = "0.1.0"
description = "MCP Server - Knowledge Base (小镇设定库查询)"
requires-python = ">=3.13"
dependencies = [
    "fastmcp>=2.0",  # FastMCP 2.0+
    "structlog>=24.4",
    "pydantic>=2.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]

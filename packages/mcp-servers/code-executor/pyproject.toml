[project]
name = "code-executor"
version = "0.1.0"
description = "MCP Server - Code Executor"
requires-python = ">=3.13"
dependencies = [
    "fastmcp>=2.0",  # FastMCP 2.0+
    "structlog>=24.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]
[project]
name = "ai-town-backend"
version = "0.1.0"
description = "AI Town Backend - World Engine + LangGraph"
requires-python = ">=3.13"
dependencies = [
    # Web 框架
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    # WebSocket（FastAPI/Starlette 底层实现之一，显式声明避免被移除）
    "websockets>=13.0",
    # 数据库
    "sqlalchemy[asyncio]>=2.0",
    "alembic>=1.14",
    "asyncpg>=0.30",
    "pgvector>=0.3",
    "uuid6>=2024.7.10",
    # Redis
    "redis[hiredis]>=5.2",
    # 数据校验
    "pydantic>=2.10",
    "pydantic-settings>=2.6",
    # LLM（使用最新版本）
    "openai>=2.40",
    "langchain>=1.3",
    "langchain-openai>=1.3",
    "langchain-core>=1.4",
    # 可观测性
    "opentelemetry-api>=1.28",
    "opentelemetry-sdk>=1.28",
    "opentelemetry-exporter-otlp>=1.28",
    "opentelemetry-exporter-otlp-proto-http>=1.28",
    "opentelemetry-instrumentation-fastapi>=0.48b0",
    "opentelemetry-instrumentation-asyncpg>=0.48b0",
    "structlog>=24.4",
    "prometheus-client>=0.21",
    "langfuse>=2.0.0,<3.0.0",
    # HTTP 客户端
    "httpx>=0.28",
    # 工具
    "python-multipart>=0.0.12",
    "python-jose[cryptography]>=3.3",
    "passlib[bcrypt]>=1.7",
    "pyyaml>=6.0",
    # 定时调度（月度分区预创建、Phase 3.5 成本控制等）
    "apscheduler>=3.11",
    "fastmcp>=3.4.4",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=6.0",
    "testcontainers>=4.9",
    "ruff>=0.8",
    "mypy>=1.14",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.ruff]
line-length = 120
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = [
    "E501",
    "B904",   # 异常链，手动处理需谨慎
    "B008",   # FastAPI 默认值调用，实际无害
    "E402",   # 导入位置（如有特殊原因可忽略）
    "B027",   # 空抽象方法（可改为抽象方法或移除）
]

[tool.mypy]
python_version = "3.13"
strict = true
ignore_missing_imports = true
explicit_package_bases = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

